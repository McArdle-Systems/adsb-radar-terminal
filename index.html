<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ADS-B Radar Scope</title>
  <style>
    :root { --green: #39ff7a; --dim: #1f8f48; --warn: #ff5b4d; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #020a04; overflow: hidden; }
    body {
      font: 12px 'Consolas', 'DejaVu Sans Mono', monospace;
      color: var(--green);
      display: flex; flex-direction: column;
    }
    #scope { flex: 1; width: 100%; display: block; }

    #hud {
      position: fixed; inset: 0; pointer-events: none;
      padding: 14px; text-shadow: 0 0 6px rgba(57,255,122,0.6);
    }
    #hud .row { display: flex; gap: 18px; align-items: baseline; pointer-events: auto; }
    #title { letter-spacing: 3px; font-weight: bold; }
    #status.ok  { color: var(--green); }
    #status.err { color: var(--warn); text-shadow: 0 0 6px rgba(255,91,77,0.6); }
    #source { opacity: 0.55; max-width: 60vw; white-space: nowrap;
              overflow: hidden; text-overflow: ellipsis; }
    .corner-bl { position: fixed; left: 14px; bottom: 12px; }
    .corner-br { position: fixed; right: 14px; bottom: 12px; text-align: right; }
    #count { font-size: 14px; }
    #range { opacity: 0.8; }

    /* layers box */
    #layers-box {
      position: fixed; top: 44px; right: 14px; pointer-events: auto;
      border: 1px solid var(--dim); border-radius: 4px;
      background: rgba(2,10,4,0.72); padding: 8px 10px; min-width: 132px;
    }
    #layers-box .hdr { letter-spacing: 2px; opacity: 0.7; margin-bottom: 6px; font-size: 11px; }
    .layer-row { display: flex; align-items: center; gap: 7px; cursor: pointer;
                 padding: 2px 0; user-select: none; }
    .layer-row input { accent-color: var(--green); cursor: pointer; margin: 0; }
    .layer-row span { font-size: 12px; }
    #hint { position: fixed; left: 14px; top: 44px; opacity: 0.4; font-size: 11px; }
    #mute {
      pointer-events: auto; cursor: pointer; user-select: none;
      border: 1px solid var(--dim); border-radius: 3px;
      padding: 2px 8px; background: rgba(0,0,0,0.3); color: var(--green);
    }
    #mute.off { color: var(--dim); opacity: 0.6; }

    /* faint scanline / CRT texture */
    #crt {
      position: fixed; inset: 0; pointer-events: none; opacity: 0.5;
      background: repeating-linear-gradient(
        to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
    }
  </style>
</head>
<body>
  <canvas id="scope"></canvas>
  <div id="crt"></div>

  <div id="hud">
    <div class="row">
      <span id="title">ADS-B SCOPE</span>
      <span id="status" class="err">● BOOTING</span>
      <span id="clock"></span>
      <span id="range">RNG --</span>
      <span id="mute">♪ on</span>
    </div>

    <div id="layers-box">
      <div class="hdr">LAYERS</div>
      <div id="layers"></div>
    </div>

    <div id="hint">scroll = zoom · +/− keys · 0 = reset</div>
    <div class="corner-bl"><div id="source">connecting…</div></div>
    <div class="corner-br"><div id="count">0 contacts</div></div>
  </div>

  <!-- committed defaults, then personal values (site.js: generated by serve.py
       from .env in proxy mode; a gitignored static file in direct mode), then app -->
  <script src="config.js"></script>
  <script src="site.js" onerror="/* no site.js (direct mode without one) — using config.js fallbacks */"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
